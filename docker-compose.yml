version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rever_db
    environment:
      POSTGRES_USER: rever_user
      POSTGRES_PASSWORD: rever_password
      POSTGRES_DB: rever
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rever_user -d rever"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    container_name: rever_server
    ports:
      - "5001:5001"

    environment:
      - DATABASE_URL=postgresql://rever_user:rever_password@db:5432/rever
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD}
      - CORS_ORIGINS=https://annonyme.pro,https://www.annonyme.pro
      - NODE_ENV=production
      - APP_URL=https://annonyme.pro
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:contact@annonyme.pro}
      # Variables pour nginx-proxy & acme-companion (SSL automatique)
      - VIRTUAL_HOST=api.annonyme.pro
      - VIRTUAL_PORT=5001
      - LETSENCRYPT_HOST=api.annonyme.pro
      - LETSENCRYPT_EMAIL=sarrmouhamadoulamin99@gmail.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - db
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - default
      - proxy-tier
    restart: unless-stopped

  client:
    build:
      context: ./client
    container_name: rever_client
    expose:
      - "80"
    environment:
      # Variables pour nginx-proxy & acme-companion (SSL automatique)
      - VIRTUAL_HOST=annonyme.pro,www.annonyme.pro
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=annonyme.pro,www.annonyme.pro
      - LETSENCRYPT_EMAIL=sarrmouhamadoulamin99@gmail.com
    depends_on:
      - server
    networks:
      - default
      - proxy-tier
    restart: unless-stopped

volumes:
  pgdata:

networks:
  proxy-tier:
    external: true
